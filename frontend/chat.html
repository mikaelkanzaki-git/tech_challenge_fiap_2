<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chat de Triagem</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="chat-shell">
      <aside class="summary-panel">
        <p class="eyebrow">Agente de triagem</p>
        <p>
          Responda uma pergunta por vez. Quando todos os dados estiverem completos, o agente consulta o modelo e retorna a categoria de risco.
        </p>
        <dl id="patient-summary" class="patient-summary"></dl>
        <div class="side-actions">
          <button id="restart-button" class="ghost-button restart-button" type="button">Nova entrevista</button>
          <button id="logout-button" class="ghost-button logout-button" type="button">Sair</button>
        </div>
      </aside>

      <section class="chat-panel" aria-label="Atendimento">
        <header class="chat-header">
          <div>
            <p class="eyebrow">Atendimento</p>
          </div>
          <span id="chat-status" class="status-pill">online</span>
        </header>

        <div id="messages" class="messages" aria-live="polite"></div>
        <div id="quick-actions" class="quick-actions" aria-label="Ações rápidas"></div>

        <form id="chat-form" class="chat-form">
          <input
            id="chat-input"
            name="message"
            type="text"
            autocomplete="off"
            placeholder="Digite sua resposta..."
            required
          />
          <button type="submit">Enviar</button>
        </form>
      </section>
    </main>
    <script src="/chat.js"></script>
  </body>
  v1
</html>
