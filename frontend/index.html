<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Triagem Inteligente</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="login-card" aria-labelledby="login-brand">
        <h1 id="login-brand" class="login-brand">Tech Challenge FIAP</h1>

        <form id="login-form" class="form-panel">
          <label for="username">E-mail</label>
          <input id="username" name="username" type="email" autocomplete="username" value="fiap@tech2.com" required />

          <label for="password">Senha</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />

          <button type="submit">Entrar no atendimento</button>
          <p id="login-message" class="form-message" role="status"></p>
        </form>
      </section>
    </main>
    <script src="/login.js"></script>
  </body>
</html>
